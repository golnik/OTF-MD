[input]
  xyz_file = geometry.xyz
  mol_file = geometry.mol
  
[external]
  run_script  = script.sh
  command     = bash $RUN_SCRIPT $XYZ_OUT $EG_OUT
    
[propagation]
  method  = VelocityVerlet
  dt      = 0.29026611048
  steps   = 100
  
[output]
  TMP_DIR = calc
  XYZ_OUT = $TMP_DIR/XYZ_$TSTEP.xyz
  VEL_OUT = $TMP_DIR/VEL_$TSTEP.xyz
  EG_OUT  = $TMP_DIR/EG_$TSTEP.out
